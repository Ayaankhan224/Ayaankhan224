name: Update profile art

on:
  # Refresh the contribution graph once per day, plus allow manual runs.
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Fetch contributions
        run: python scripts/fetch_contributions.py
        env:
          GH_PROFILE_USER: Ayaankhan224

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update contribution graph"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
